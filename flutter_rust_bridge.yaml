rust_input: crate::api
rust_root: crates/whitenoise-frb/
# .frb-staging/ is a transient staging directory populated by `just frb-stage`
# from crates/whitenoise-frb/template/ (vendored on master). It receives
# generated Dart bindings; master never tracks them. CI tars this directory
# and publishes it to the gh-pages hosted pub registry.
dart_output: .frb-staging/lib/src/rust
web: false
enable_lifetime: true
