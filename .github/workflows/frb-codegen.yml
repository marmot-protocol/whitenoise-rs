name: FRB codegen

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to regenerate from"
        required: false
        default: "master"

permissions:
  contents: write

concurrency:
  group: frb-codegen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify actor is a codeowner
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: |
            .github/CODEOWNERS
          sparse-checkout-cone-mode: false
      - id: check
        env:
          ACTOR: ${{ github.actor }}
        run: |
          # Read the wildcard rule from CODEOWNERS so the allowlist can't
          # drift from the source of truth. Lines look like:
          #   * @user1 @user2 @org/team
          # Strip the leading @ so $ACTOR (a bare login) matches.
          mapfile -t codeowners < <(
            awk '/^\*[[:space:]]/ {for (i=2; i<=NF; i++) print $i}' \
              .github/CODEOWNERS | sed 's/^@//'
          )
          if [[ ${#codeowners[@]} -eq 0 ]]; then
            echo "✗ Could not parse codeowners from .github/CODEOWNERS." >&2
            exit 1
          fi
          # github.actor is a user login, so team entries (org/team) cannot
          # be matched directly. Fail fast with a clear message rather than
          # silently denying valid codeowners that happen to be in a team.
          for owner in "${codeowners[@]}"; do
            if [[ "$owner" == */* ]]; then
              echo "✗ Team entry '${owner}' found in CODEOWNERS." >&2
              echo "  This gate compares against github.actor (a user login)" >&2
              echo "  and cannot resolve team membership. Either add the" >&2
              echo "  team's members to the wildcard rule explicitly, or" >&2
              echo "  extend this workflow to query the GitHub Teams API." >&2
              exit 1
            fi
          done
          for owner in "${codeowners[@]}"; do
            if [[ "$ACTOR" == "$owner" ]]; then
              echo "$ACTOR is a codeowner — proceeding."
              echo "authorized=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "$ACTOR is not in the codeowner allowlist — skipping codegen."
          echo "authorized=false" >> "$GITHUB_OUTPUT"

  codegen:
    name: Regenerate bindings and update flutter-package branch
    needs: gate
    if: needs.gate.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    env:
      FRB_VERSION: "2.11.1"
      STAGING: ".frb-staging"
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
          fetch-depth: 1
          path: source

      - name: Capture real source SHA
        id: src
        working-directory: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Checkout flutter-package orphan branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: flutter-package
          fetch-depth: 1
          path: source/.frb-staging
          # Don't persist the default token: we set our own auth header in
          # the push step (avoids token-in-URL leakage via `git remote -v`).
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "source -> target"

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen \
            --version "${FRB_VERSION}" \
            --locked

      - name: Install Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Run codegen into staging worktree
        working-directory: source
        run: bash scripts/frb-generate.sh

      - name: Lint wrapper crate
        working-directory: source
        run: bash scripts/frb-check.sh

      - name: Vendor wrapper crate into staging
        working-directory: source
        env:
          SOURCE_SHA: ${{ steps.src.outputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf "${STAGING}/rust"
          mkdir -p "${STAGING}/rust"
          cp -r crates/whitenoise-frb/. "${STAGING}/rust/"

          sed -i \
            "s#^whitenoise = { path = \"../..\" }\$#whitenoise = { git = \"https://github.com/${REPO}\", rev = \"${SOURCE_SHA}\" }#" \
            "${STAGING}/rust/Cargo.toml"

          # Tighter validation: any remaining `whitenoise = { path = ` line
          # means the rewrite failed. Print the file so CI logs are useful.
          if grep -q '^whitenoise = { path = ' "${STAGING}/rust/Cargo.toml"; then
            echo "Dep rewrite failed. ${STAGING}/rust/Cargo.toml content:" >&2
            cat "${STAGING}/rust/Cargo.toml" >&2
            exit 1
          fi

      - name: Refresh provenance marker
        working-directory: source
        env:
          SOURCE_SHA: ${{ steps.src.outputs.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "Regenerated from: ${REPO}@${SOURCE_SHA}"
            echo "Run: ${RUN_ID}"
            echo "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "flutter_rust_bridge: ${FRB_VERSION}"
          } > "${STAGING}/REGENERATED.txt"

      - name: Commit and push if changed
        working-directory: source/.frb-staging
        env:
          GH_TOKEN: ${{ secrets.FRB_PR_TOKEN || secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ steps.src.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.email "frb-codegen-bot@marmot-protocol.org"
          git config user.name  "frb-codegen-bot"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish — bindings already current."
            exit 0
          fi

          git commit -q -m "frb: regenerate from ${SOURCE_SHA}"

          # Auth via extraheader instead of embedding the token in the
          # remote URL. The header lives only in this worktree's local git
          # config and never appears in `git remote -v` output.
          git config --local "http.https://github.com/.extraheader" \
            "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"
          git push origin flutter-package

      - name: Summary
        env:
          SOURCE_SHA: ${{ steps.src.outputs.sha }}
        run: |
          {
            echo "### FRB regen complete"
            echo
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Updated branch: \`flutter-package\`"
            echo "- Consumers: bump their git ref or run \`flutter pub upgrade\`."
          } >> "${GITHUB_STEP_SUMMARY}"
