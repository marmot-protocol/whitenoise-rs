services:
  setup:
    image: busybox:latest
    volumes:
      - ./dev/data:/data
    command: >
      sh -c "
        mkdir -p /data/nostr-rs-relay /data/blossom-ts-server /data/strfry-db &&
        chmod 755 /data/nostr-rs-relay /data/blossom-ts-server /data/strfry-db &&
        chown 1000:1000 /data/nostr-rs-relay &&
        chmod 777 /data &&
        echo 'Data directories created successfully'
      "

  nostr-rs-relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "8080:8080"
    volumes:
      - ./dev/data/nostr-rs-relay:/usr/src/app/db
      - ./dev/nostr-rs-relay-config.toml:/usr/src/app/config.toml
    environment:
      - RUST_LOG=debug
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully

  blossom:
    image: ghcr.io/hzrd149/blossom-server@sha256:efef9fa3ef47934aff586dd2161f221bd9549f0ace4c3432f65e1afb5d3f4d0a
    volumes:
      - ./dev/data/blossom-ts-server:/app/data
      - ./dev/blossom-server-ts-config.yml:/app/config.yml
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - DEBUG=*
    depends_on:
      setup:
        condition: service_completed_successfully

  strfry-nostr-relay:
    image: dockurr/strfry:latest
    volumes:
      - ./dev/strfry.conf:/etc/strfry.conf
      - ./dev/data/strfry-db:/app/strfry-db
    ports:
      - "7777:7777"
    restart: unless-stopped
    command: ["./strfry", "relay", "-v", "1"]
    depends_on:
      setup:
        condition: service_completed_successfully

  transponder:
    image: whitenoise-rs-transponder:latest
    build:
      context: ./dev/transponder
      dockerfile: Dockerfile
    env_file:
      - ./dev/transponder/.env
    volumes:
      - ./dev/transponder/config.toml:/etc/transponder/config.toml:ro
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    healthcheck:
      test: ["CMD", "/usr/local/bin/transponder", "healthcheck", "--url", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      setup:
        condition: service_completed_successfully
      nostr-rs-relay:
        condition: service_started
      strfry-nostr-relay:
        condition: service_started
